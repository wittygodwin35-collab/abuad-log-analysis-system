[PROFILING]
enabled = False

[SNAPSHOT]
snapshot_interval_minutes = 5
compress_state = True

[MASKING]
masking = [{"regex_pattern":"\\\\b\\\\d{1,3}(?:\\\\.\\\\d{1,3}){3}\\\\b","mask_with":"<IP>"},{"regex_pattern":"\\\\b[0-9a-fA-F]{8,}\\\\b","mask_with":"<HEX>"},{"regex_pattern":"\\\\b\\\\d+\\\\b","mask_with":"<NUM>"}]

[DRAIN]
sim_th = 0.4
depth = 4
max_children = 100
max_clusters = 10000
extra_delimiters = ["_", ":"]
parametrize_numeric_tokens = True
